<script>
    // 全局配置
    const GIST_ID_KEY = "myLifeRecordsGistId";
    const GITHUB_TOKEN_KEY = "githubToken";
    
    // 固定Gist ID
    const FIXED_GIST_ID = "74c69252b631b6c98f3a28f039a2f547";
    
    let currentEditId = null;
    let previewFiles = { image: null, video: null };
    let bgImageFile = null;

    // 页面加载初始化
    window.onload = async function() {
        const tokenData = localStorage.getItem(GITHUB_TOKEN_KEY);
        
        if (tokenData) {
            try {
                const tokenObj = JSON.parse(tokenData);
                if (tokenObj.expireTime && tokenObj.expireTime > new Date().getTime()) {
                    document.getElementById("authOverlay").classList.add("hidden");
                    await loadBgImage(tokenObj.value);
                    await loadRecords(tokenObj.value);
                } else {
                    document.getElementById("authOverlay").classList.remove("hidden");
                }
            } catch (e) {
                document.getElementById("authOverlay").classList.remove("hidden");
            }
        } else {
            document.getElementById("authOverlay").classList.remove("hidden");
        }
    };

    // Token授权
    function saveToken() {
        const token = document.getElementById("githubToken").value.trim();
        if (!token) {
            alert("请输入有效的GitHub Token！");
            return;
        }
        
        const tokenData = {
            value: token,
            expireTime: new Date().getTime() + 10 * 365 * 24 * 60 * 60 * 1000 // 10年
        };
        
        localStorage.setItem(GITHUB_TOKEN_KEY, JSON.stringify(tokenData));
        localStorage.setItem(GIST_ID_KEY, FIXED_GIST_ID);
        
        document.getElementById("authOverlay").classList.add("hidden");
        loadBgImage(token);
        loadRecords(token);
        
        alert("授权成功！");
    }

    // 退出登录
    function logout() {
        if (confirm('确定要清除Token吗？清除后需要重新授权才能查看记录！')) {
            localStorage.removeItem(GITHUB_TOKEN_KEY);
            document.getElementById("recordsList").innerHTML = "";
            document.getElementById("mainBody").style.backgroundImage = "none";
            resetEditState();
            document.getElementById("authOverlay").classList.remove("hidden");
            alert('Token已清除，数据安全！');
        }
    }

    // ========== 新增：智能图片压缩函数 ==========
    async function compressImageIfNeeded(file) {
        // 如果小于5MB，直接返回原文件
        if (file.size <= 5 * 1024 * 1024) {
            return file;
        }
        
        // 如果大于10MB，直接拒绝
        if (file.size > 10 * 1024 * 1024) {
            throw new Error('图片太大（超过10MB），请压缩后再试');
        }
        
        // 5-10MB之间，自动压缩
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 计算压缩尺寸（最长边1200px）
                    let width = img.width;
                    let height = img.height;
                    const maxSize = 1200;
                    
                    if (width > height && width > maxSize) {
                        height = Math.round((height * maxSize) / width);
                        width = maxSize;
                    } else if (height > maxSize) {
                        width = Math.round((width * maxSize) / height);
                        height = maxSize;
                    } else {
                        // 本来就很小，不用压缩
                        width = img.width;
                        height = img.height;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 转成Blob，质量0.8
                    canvas.toBlob((blob) => {
                        console.log(`压缩前: ${(file.size/1024/1024).toFixed(2)}MB, 压缩后: ${(blob.size/1024/1024).toFixed(2)}MB`);
                        resolve(blob);
                    }, 'image/jpeg', 0.8);
                };
                img.onerror = () => reject(new Error('图片处理失败'));
            };
            reader.onerror = () => reject(new Error('图片读取失败'));
        });
    }

    // ========== 新增：视频大小检查 ==========
    function checkVideoSize(file) {
        if (file.size > 8 * 1024 * 1024) {
            alert('视频较大（超过8MB），可能保存失败。建议压缩后再试。');
            return true; // 允许继续，但警告
        }
        if (file.size > 15 * 1024 * 1024) {
            alert('视频太大（超过15MB），无法保存到Gist！');
            return false; // 阻止
        }
        return true; // 通过
    }

    // 背景图片预览
    function previewBgImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        if (file.size > 10 * 1024 * 1024) {
            alert('背景图片太大（超过10MB），请选择更小的图片');
            event.target.value = '';
            return;
        }
        
        bgImageFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("mainBody").style.backgroundImage = `url(${e.target.result})`;
        };
        reader.readAsDataURL(file);
    }

    // 保存背景图片
    async function saveBgImage() {
        if (!bgImageFile) {
            alert("请先选择背景图片！");
            return;
        }
        
        const tokenData = localStorage.getItem(GITHUB_TOKEN_KEY);
        if (!tokenData) {
            alert("请先授权！");
            return;
        }
        
        const token = JSON.parse(tokenData).value;
        showLoading(true);
        
        try {
            // 背景图片也压缩一下
            let fileToUpload = bgImageFile;
            if (bgImageFile.size > 2 * 1024 * 1024) {
                fileToUpload = await compressImageIfNeeded(bgImageFile);
            }
            
            const reader = new FileReader();
            reader.readAsDataURL(fileToUpload);
            reader.onload = async function(e) {
                const bgImageUrl = e.target.result;
                
                try {
                    let records = [];
                    try {
                        const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                            headers: { Authorization: `token ${token}` }
                        });
                        const content = JSON.parse(res.data.files["records.json"].content);
                        records = content.records || [];
                    } catch (e) {
                        console.log("新建Gist");
                    }
                    
                    const data = {
                        bgImageUrl: bgImageUrl,
                        records: records
                    };
                    
                    await axios.patch(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                        files: {
                            "records.json": { content: JSON.stringify(data) }
                        }
                    }, { headers: { Authorization: `token ${token}` } });
                    
                    showLoading(false);
                    alert("背景保存成功！");
                } catch (e) {
                    showLoading(false);
                    console.error("保存背景失败", e);
                    alert("保存失败，请检查Token权限或网络！");
                }
            };
        } catch (e) {
            showLoading(false);
            alert('背景图片处理失败：' + e.message);
        }
    }

    // 加载背景图片
    async function loadBgImage(token) {
        try {
            const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                headers: { Authorization: `token ${token}` }
            });
            const content = JSON.parse(res.data.files["records.json"].content);
            if (content.bgImageUrl) {
                document.getElementById("mainBody").style.backgroundImage = `url(${content.bgImageUrl})`;
            }
        } catch (e) {
            console.log("暂无背景图片");
        }
    }

    // 重置背景
    async function resetBg() {
        const tokenData = localStorage.getItem(GITHUB_TOKEN_KEY);
        if (!tokenData) {
            alert("请先授权！");
            return;
        }
        
        const token = JSON.parse(tokenData).value;
        showLoading(true);
        
        try {
            const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                headers: { Authorization: `token ${token}` }
            });
            const content = JSON.parse(res.data.files["records.json"].content);
            content.bgImageUrl = "";
            
            await axios.patch(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                files: {
                    "records.json": { content: JSON.stringify(content) }
                }
            }, { headers: { Authorization: `token ${token}` } });
            
            document.getElementById("mainBody").style.backgroundImage = "none";
            document.getElementById("mainBody").style.backgroundColor = "#f9f9f9";
            
            showLoading(false);
            alert("背景已重置！");
        } catch (e) {
            showLoading(false);
            console.error("重置背景失败", e);
            alert("重置失败！");
        }
    }

    // 媒体预览
    function previewMedia(type) {
        const fileInput = document.getElementById(`${type}Upload`);
        const file = fileInput.files[0];
        if (!file) return;
        
        // 图片预览前检查
        if (type === 'image') {
            if (file.size > 10 * 1024 * 1024) {
                alert('图片太大（超过10MB），无法上传');
                fileInput.value = '';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('图片较大（超过5MB），将自动压缩');
            }
        }
        
        // 视频预览前检查
        if (type === 'video' && !checkVideoSize(file)) {
            fileInput.value = '';
            return;
        }
        
        previewFiles[type] = file;
        
        // 预览
        const previewArea = document.getElementById("previewArea");
        const oldPreviews = previewArea.querySelectorAll(`.preview-${type}`);
        oldPreviews.forEach(el => el.remove());
        
        if (type === "image") {
            const img = document.createElement("img");
            img.src = URL.createObjectURL(file);
            img.className = "preview-img preview-image";
            previewArea.appendChild(img);
        } else if (type === "video") {
            const video = document.createElement("video");
            video.src = URL.createObjectURL(file);
            video.className = "preview-video preview-video";
            video.controls = true;
            previewArea.appendChild(video);
        }
    }

    // 加载记录
    async function loadRecords(token) {
        showLoading(true);
        let records = [];
        
        try {
            const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                headers: { Authorization: `token ${token}` }
            });
            const content = JSON.parse(res.data.files["records.json"].content);
            records = content.records || [];
            
            if (records.length > 0) {
                localStorage.setItem('hasData', 'true');
            }
        } catch (e) {
            console.log("创建新记录集合");
            localStorage.setItem('hasData', 'false');
        }
        
        records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        renderRecords(records);
        showLoading(false);
    }

    // 渲染记录列表
    function renderRecords(records) {
        const recordsList = document.getElementById("recordsList");
        recordsList.innerHTML = "";
        records.forEach(record => {
            recordsList.appendChild(createRecordCard(record));
        });
    }

    // 创建记录卡片
    function createRecordCard(record) {
        const card = document.createElement("div");
        card.className = "record-card";
        card.id = `record-${record.id}`;
        
        let mediaHtml = '';
        if (record.imageUrl) {
            mediaHtml += `<img src="${record.imageUrl}" alt="记录图片">`;
        }
        if (record.videoUrl) {
            mediaHtml += `<video controls src="${record.videoUrl}"></video>`;
        }
        
        card.innerHTML = `
            <div class="record-header">
                <span class="record-time">${formatTime(record.timestamp)}</span>
                <span class="record-type">${record.type}</span>
            </div>
            <div class="record-content">${record.content.replace(/\n/g, "<br>")}</div>
            <div class="record-media">${mediaHtml}</div>
            <div class="record-actions">
                <button class="edit-btn" onclick="editRecord('${record.id}')">编辑</button>
                <button class="delete-btn" onclick="deleteRecord('${record.id}')">删除</button>
            </div>
        `;
        return card;
    }

    // 文件转Base64
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                const result = e.target.result;
                if (!result || !result.startsWith('data:')) {
                    reject(new Error('文件读取失败'));
                    return;
                }
                resolve(result);
            };
            reader.onerror = () => reject(new Error('文件读取失败'));
            reader.readAsDataURL(file);
        });
    }

    // 保存记录
    async function saveRecord() {
        const type = document.getElementById("contentType").value;
        const content = document.getElementById("contentInput").value.trim();
        
        if (!content) {
            alert("请输入记录内容！");
            return;
        }
        
        const tokenData = localStorage.getItem(GITHUB_TOKEN_KEY);
        if (!tokenData) {
            alert("请先授权！");
            return;
        }
        
        const token = JSON.parse(tokenData).value;
        showLoading(true);
        
        try {
            // 处理图片（自动压缩）
            let imageUrl = "";
            if (previewFiles.image) {
                try {
                    let fileToUpload = previewFiles.image;
                    if (previewFiles.image instanceof File) {
                        fileToUpload = await compressImageIfNeeded(previewFiles.image);
                    }
                    imageUrl = await fileToBase64(fileToUpload);
                } catch (e) {
                    showLoading(false);
                    alert('图片处理失败：' + e.message);
                    return;
                }
            }
            
            // 处理视频（只检查，不压缩）
            let videoUrl = "";
            if (previewFiles.video) {
                if (previewFiles.video instanceof File) {
                    if (!checkVideoSize(previewFiles.video)) {
                        showLoading(false);
                        return;
                    }
                    videoUrl = await fileToBase64(previewFiles.video);
                } else {
                    videoUrl = previewFiles.video;
                }
            }
            
            const record = {
                id: currentEditId || generateId(),
                type: type,
                content: content,
                timestamp: new Date().toISOString(),
                imageUrl: imageUrl,
                videoUrl: videoUrl
            };
            
            // 读取现有数据
            let records = [];
            let bgImageUrl = "";
            let readSuccess = false;
            
            try {
                const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                    headers: { Authorization: `token ${token}` },
                    timeout: 10000
                });
                const content = JSON.parse(res.data.files["records.json"].content);
                records = content.records || [];
                bgImageUrl = content.bgImageUrl || "";
                readSuccess = true;
            } catch (e) {
                console.error("读取记录失败", e);
                const hasData = localStorage.getItem('hasData') === 'true';
                if (hasData) {
                    showLoading(false);
                    alert('读取现有记录失败，请检查网络后重试！\n（你的数据是安全的，没有丢失）');
                    return;
                }
            }
            
            // 更新记录
            if (currentEditId) {
                records = records.map(r => r.id === currentEditId ? record : r);
            } else {
                records.push(record);
            }
            
            // 保存到云端
            const data = { bgImageUrl, records };
            
            try {
                await axios.patch(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                    files: {
                        "records.json": { content: JSON.stringify(data) }
                    }
                }, { 
                    headers: { Authorization: `token ${token}` },
                    timeout: 30000
                });
                
                localStorage.setItem('hasData', 'true');
                
            } catch (e) {
                console.error("保存到Gist失败", e);
                showLoading(false);
                
                if (e.response && e.response.status === 404) {
                    alert('Gist不存在，请检查Token权限！');
                } else if (e.code === 'ECONNABORTED') {
                    alert('保存超时，可能是文件太大，请压缩后再试');
                } else {
                    alert('保存失败：' + (e.message || '未知错误'));
                }
                return;
            }
            
            resetEditState();
            await loadRecords(token);
            showLoading(false);
            alert(currentEditId ? "记录编辑成功！" : "记录保存成功！");
            
        } catch (e) {
            showLoading(false);
            console.error("保存记录过程中发生错误", e);
            alert('保存失败：' + (e.message || '未知错误'));
        }
    }

    // 编辑记录
    async function editRecord(id) {
        const tokenData = localStorage.getItem(GITHUB_TOKEN_KEY);
        if (!tokenData) {
            alert("请先授权！");
            return;
        }
        
        const token = JSON.parse(tokenData).value;
        showLoading(true);
        
        try {
            const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                headers: { Authorization: `token ${token}` }
            });
            
            const content = JSON.parse(res.data.files["records.json"].content);
            const record = content.records.find(r => r.id === id);
            
            if (record) {
                document.getElementById("contentType").value = record.type;
                document.getElementById("contentInput").value = record.content;
                currentEditId = id;
                
                const previewArea = document.getElementById("previewArea");
                previewArea.innerHTML = "";
                
                if (record.imageUrl) {
                    const img = document.createElement("img");
                    img.src = record.imageUrl;
                    img.className = "preview-img preview-image";
                    previewArea.appendChild(img);
                    previewFiles.image = record.imageUrl;
                }
                if (record.videoUrl) {
                    const video = document.createElement("video");
                    video.src = record.videoUrl;
                    video.className = "preview-video preview-video";
                    video.controls = true;
                    previewArea.appendChild(video);
                    previewFiles.video = record.videoUrl;
                }
                
                document.getElementById("editTitle").textContent = "✏️ 编辑记事";
                document.getElementById("cancelEditBtn").classList.remove("hidden");
            }
            
            showLoading(false);
        } catch (e) {
            showLoading(false);
            console.error("编辑记录失败", e);
            alert("编辑失败！");
        }
    }

    // 删除记录
    async function deleteRecord(id) {
        if (!confirm("确定要删除这条记录吗？")) return;
        
        const tokenData = localStorage.getItem(GITHUB_TOKEN_KEY);
        if (!tokenData) {
            alert("请先授权！");
            return;
        }
        
        const token = JSON.parse(tokenData).value;
        showLoading(true);
        
        try {
            const res = await axios.get(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                headers: { Authorization: `token ${token}` }
            });
            
            const content = JSON.parse(res.data.files["records.json"].content);
            const records = content.records.filter(r => r.id !== id);
            const bgImageUrl = content.bgImageUrl || "";
            
            await axios.patch(`https://api.github.com/gists/${FIXED_GIST_ID}`, {
                files: {
                    "records.json": { content: JSON.stringify({ bgImageUrl, records }) }
                }
            }, { headers: { Authorization: `token ${token}` } });
            
            await loadRecords(token);
            showLoading(false);
            alert("记录删除成功！");
        } catch (e) {
            showLoading(false);
            console.error("删除记录失败", e);
            alert("删除失败！");
        }
    }

    // 取消编辑
    function cancelEdit() {
        resetEditState();
    }

    // 重置编辑状态
    function resetEditState() {
        document.getElementById("contentType").value = "日常思考";
        document.getElementById("contentInput").value = "";
        document.getElementById("previewArea").innerHTML = "";
        document.getElementById("editTitle").textContent = "✍️ 小屋记事";
        document.getElementById("cancelEditBtn").classList.add("hidden");
        
        document.getElementById("imageUpload").value = "";
        document.getElementById("videoUpload").value = "";
        
        currentEditId = null;
        previewFiles = { image: null, video: null };
        bgImageFile = null;
    }

    // 工具函数
    function generateId() {
        return Date.now() + "-" + Math.random().toString(36).substr(2, 9);
    }

    function formatTime(isoString) {
        const date = new Date(isoString);
        return date.toLocaleString("zh-CN", {
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit", second: "2-digit"
        });
    }

    function showLoading(show) {
        const overlay = document.getElementById("loadingOverlay");
        show ? overlay.classList.remove("hidden") : overlay.classList.add("hidden");
    }
</script>
